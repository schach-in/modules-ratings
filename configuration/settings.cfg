; 
; Syntax of this configuration file:
; 
; [key]: setting key
; - Field "description": description, just for information.
; - Field "type": type of setting, e. g. mail, number, foreign_key, etc.
; - Field "default": default value
; - Field "db_field": corresponding database field (table.field)
;

[ratings_club_code]
description = "If club code differs from identifier in German database"

[ratings_corrupt]
description = "List of days where download file was corrupt and should not be used"
list = 1

["ratings_corrupt[DWZ]"]
description = "List of days where download file for DWZ was corrupt and should not be used"
list = 1

["ratings_corrupt[Elo]"]
description = "List of days where download file for Elo was corrupt and should not be used"
list = 1

[ratings_datachecks_link_max_entries]
description = "Maximum no. of entries where a datacheck overview links to an list of all problems (for performance reasons)"
type = int
default = 2000

[ratings_dir]
description = "folder for downloaded rating archives (DWZ, Elo, …), one subfolder per rating"
type = folder
default = %%% setting data_dir %%%/ratings
install_folder = 1

[ratings_dewis_socket_timeout]
description = "Timeout in seconds for socket based stream"
type = int
default = 2000

[ratings_dewis_ssl]
description = "Establish a connection via SSL to server"
type = bool
default = 1

[ratings_dewis_url]
description = "URL of DeWIS service"
type = url
default = "https://dwz.svw.info/services/files/dewis.wsdl"

[ratings_dewis_wait_ms]
description = "Time to wait between each request to DeWIS"
type = int
default = 100

[ratings_dsb_federations_are_clubs]
description = "Some federations in the DSB have a club code, too, that is undocumented."
default = "L,M"

["ratings_download[DWZ]"]
description = "URL under which the current DWZ data of the German Chess Federation is available in SQL format"
type = url
default = https://dwz.svw.info/services/files/export/sql/LV-0-sql_v2.zip

["ratings_download[Elo]"]
description = "URL under which the current FIDE Elo data is available in TXT format"
type = url
default = https://ratings.fide.com/download/players_list.zip

["ratings_sync_file[Elo]"]
description = "Name of file with FIDE Elo data"
default = "players_list_foa.txt"

[ratings_list_dsb]
description = "Use rating list from schachbund.de (DSB)"
type = bool
default = 1

[ratings_list_fide]
description = "Use rating list from fide.com (FIDE)"
type = bool
default = 1

[ratings_logfile_elo]
description = "use logfile for sync of Elo rating data"
type = bool
default = 1

[ratings_logfile_elo_fields]
description = "List of fields for Elo sync log"
list = 1
default[] = timestamp
default[] = action
default[] = result

[ratings_logfile_elo_spaces]
description = "Logfile tokens might contain spaces?"
type = bool
scope[] = internal

[ratings_logfile_elo_validity_in_minutes]
description = "Validity of entries in Elo sync log"
type = int
default = 1440

[ratings_logfile_memberstats]
description = "use logfile for memberstats import"
type = bool
default = 1

[ratings_logfile_memberstats_fields]
description = "List of fields for memberstats import log"
list = 1
default[] = timestamp
default[] = action
default[] = result

[ratings_logfile_memberstats_spaces]
description = "Logfile tokens might contain spaces?"
type = bool
scope[] = internal
default = 1

[ratings_logfile_memberstats_validity_in_minutes]
description = "Validity of entries in memberstats import log"
type = int
default = 1440

[ratings_members]
description = "Categories of contacts or contacts that have members with ratings"
type = bool
scope[] = contacts
scope[] = categories

[ratings_memberstats_log_tick_bytes]
description = "Emit a progress log entry per this many source-file bytes consumed by the memberstats loaders"
type = int
default = 262144

[ratings_memberstats_load_batch_size]
description = "Rows per batched REPLACE/INSERT when loading DWZ snapshot files into memberstats staging tables"
type = int
default = 500

[ratings_memberstats_poll_interval]
description = "Polling interval in seconds for memberstats progress display"
type = int
default = 1

[ratings_memberstats_progress_stale_seconds]
description = "Time in seconds without a memberstats log entry after which the worker is considered stuck"
type = int
default = 30

[ratings_memberstats_progress_tail]
description = "Number of memberstats log entries returned to the progress poller (0 = all)"
type = int
default = 0

[ratings_memberstats_auto_delay_seconds]
description = "Countdown in seconds before the next snapshot import starts automatically while the memberstats page stays open"
type = int
default = 5

["ratings_status[DWZ]"]
description = "Last imported status of the German DWZ database"
type = date

["ratings_status[Elo]"]
description = "Last imported status of the FIDE Elo database"
type = date
